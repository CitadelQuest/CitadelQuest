home:
    actions:
        create_citadel: 'Opprett din CitadelQuest-konto'
        login: 'Logg inn'
    features:
        data_control:
            title: 'Dine data,<br/>Din fulle kontroll'
            description: '<p>Ende-til-ende-kryptering og personlig database sikrer at dine data forblir dine.</p><p>Du bestemmer hvem som har tilgang til dine delte data.</p><p><a href="/backups">Sikkerhetskopier</a>. Manuelle og automatiske.</p><p>Støtte for kontomigrering fra én Citadell til en annen.</p>'
        ai_collab:
            title: 'KI-samarbeid'
            description: '<p>Gjennomfør daglige oppgaver, langsiktige prosjekter eller opplev digitale eventyr med dine pålitelige personlige KI-følgesvenner, mens du opprettholder datasuverenitet.</p>'
        decentralized:
            title: 'Desentralisert,<br/>Gratis'
            description: '<p>Selvdriftet og uavhengig.</p><p>Ingen tredjeparter som overvåker og tjener penger på ditt personvern.</p><p>Ingen tredjeparts-informasjonskapsler.</p><p>Ingen annonser.</p><p>Bare deg og dine venner - tilkoblet.</p>'
        open_source:
            title: 'Åpen kildekode'
            description: '<p>CitadelQuest er et åpen kildekode-prosjekt, hostet på <a href="https://github.com/CitadelQuest/CitadelQuest" target="_blank" class="text-cyber" title="CitadelQuest GitHub">GitHub</a>, med hovedformål å gi et allment gode, i stedet for å tjene på brukernes personvern.</p><p>Vi er forpliktet til å tilby gratis programvare til brukere som deler vår visjon om en bedre, tilkoblet verden.</p>'
        easy_to_start:
            title: 'Enkelt å starte'
            description: '<p>CitadelQuest er designet for å være enkelt å starte, selv for ikke-tekniske personer.</p><p><strong>Har du allerede ditt eget domene og nettsted?</strong></p><p>Perfekt! <span class="text-cyber">Du kan installere din egen CitadelQuest på et underdomene og begynne å bruke det med en gang.</span></p><p>..eller du kan bli her, på vår offentlige <a href="https://base.citadelquest.com/" target="_blank" class="text-cyber" title="CitadelQuest Base">CitadelQuest Base</a>, og prøve det - uanstrengt og gratis.</p>'

