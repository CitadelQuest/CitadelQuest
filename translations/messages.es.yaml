home:
    actions:
        create_citadel: 'Crea tu cuenta CitadelQuest'
        login: 'Iniciar sesión'
    features:
        data_control:
            title: 'Tus datos,<br/>Tu control total'
            description: '<p>El cifrado de extremo a extremo y la base de datos personal aseguran que tus datos sean solo tuyos.</p><p>Tú decides quién tiene acceso a tus datos compartidos.</p><p><a href="/backups">Copias de seguridad</a>. Manuales y automáticas.</p><p>Soporte para migración de cuentas de una Ciudadela a otra.</p>'
        ai_collab:
            title: 'Colaboración con IA'
            description: '<p>Realiza tareas diarias, proyectos a largo plazo o vive aventuras digitales con tus compañeros personales de IA, manteniendo la soberanía de tus datos.</p>'
        decentralized:
            title: 'Descentralizado,<br/>Libre'
            description: '<p>Auto-alojado e independiente.</p><p>Sin terceros monitoreando y monetizando tu privacidad.</p><p>Sin cookies de terceros.</p><p>Sin anuncios.</p><p>Solo tú y tus amigos - conectados.</p>'
        open_source:
            title: 'Código abierto'
            description: '<p>CitadelQuest es un proyecto de código abierto, alojado en <a href="https://github.com/CitadelQuest/CitadelQuest" target="_blank" class="text-cyber" title="CitadelQuest GitHub">GitHub</a>, con el propósito principal de proporcionar un bien público general, en lugar de lucrar con la privacidad del usuario.</p><p>Nos comprometemos a proporcionar software libre a los usuarios que comparten nuestra visión de un mundo mejor y conectado.</p>'
        easy_to_start:
            title: 'Fácil de empezar'
            description: '<p>CitadelQuest está diseñado para ser fácil de empezar, incluso para personas no técnicas.</p><p><strong>¿Ya tienes tu propio dominio y sitio web?</strong></p><p>¡Perfecto! <span class="text-cyber">Puedes instalar tu propio CitadelQuest en un subdominio y empezar a usarlo de inmediato.</span></p><p>...o puedes quedarte aquí, en nuestra <a href="https://base.citadelquest.com/" target="_blank" class="text-cyber" title="CitadelQuest Base">CitadelQuest Base</a> pública, y probarlo - sin esfuerzo y gratis.</p>'

