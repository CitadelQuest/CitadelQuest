home:
    actions:
        create_citadel: 'Utwórz swoje konto CitadelQuest'
        login: 'Zaloguj się'
    features:
        data_control:
            title: 'Twoje dane,<br/>Twoja pełna kontrola'
            description: '<p>Szyfrowanie end-to-end i osobista baza danych zapewniają, że Twoje dane pozostają Twoje.</p><p>Ty decydujesz, kto ma dostęp do Twoich udostępnionych danych.</p><p><a href="/backups">Kopie zapasowe</a>. Ręczne i automatyczne.</p><p>Wsparcie migracji konta z jednej Cytadeli do drugiej.</p>'
        ai_collab:
            title: 'Współpraca z AI'
            description: '<p>Realizuj codzienne zadania, długoterminowe projekty lub przeżywaj cyfrowe przygody ze swoimi zaufanymi osobistymi towarzyszami AI, zachowując suwerenność danych.</p>'
        decentralized:
            title: 'Zdecentralizowane,<br/>Wolne'
            description: '<p>Samoobsługowe i niezależne.</p><p>Bez stron trzecich monitorujących i monetyzujących Twoją prywatność.</p><p>Bez ciasteczek stron trzecich.</p><p>Bez reklam.</p><p>Tylko Ty i Twoi przyjaciele - połączeni.</p>'
        open_source:
            title: 'Otwarte źródło'
            description: '<p>CitadelQuest to projekt open source, hostowany na <a href="https://github.com/CitadelQuest/CitadelQuest" target="_blank" class="text-cyber" title="CitadelQuest GitHub">GitHubie</a>, którego głównym celem jest dostarczenie dobra publicznego, zamiast czerpania zysków z prywatności użytkowników.</p><p>Jesteśmy zobowiązani do dostarczania wolnego oprogramowania użytkownikom, którzy podzielają naszą wizję lepszego, połączonego świata.</p>'
        easy_to_start:
            title: 'Łatwy start'
            description: '<p>CitadelQuest jest zaprojektowany tak, aby był łatwy w obsłudze, nawet dla osób nietechnicznych.</p><p><strong>Masz już własną domenę i stronę internetową?</strong></p><p>Świetnie! <span class="text-cyber">Możesz zainstalować własny CitadelQuest na subdomenie i od razu zacząć go używać.</span></p><p>...lub możesz zostać tutaj, na naszej publicznej <a href="https://base.citadelquest.com/" target="_blank" class="text-cyber" title="CitadelQuest Base">CitadelQuest Base</a>, i wypróbować go - bez wysiłku i za darmo.</p>'

