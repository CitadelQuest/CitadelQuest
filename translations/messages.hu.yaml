home:
    actions:
        create_citadel: 'Hozd létre CitadelQuest fiókodat'
        login: 'Bejelentkezés'
    features:
        data_control:
            title: 'Az adataid,<br/>A te teljes irányításod'
            description: '<p>A végponttól végpontig titkosítás és a személyes adatbázis biztosítja, hogy az adataid csak a tieid maradjanak.</p><p>Te döntöd el, ki férhet hozzá a megosztott adataidhoz.</p><p><a href="/backups">Biztonsági mentések</a>. Kézi és automatikus.</p><p>Fiók migráció támogatás egyik Citadellából a másikba.</p>'
        ai_collab:
            title: 'AI együttműködés'
            description: '<p>Végezd el a napi feladataidat, hosszú távú projektjeidet vagy élj át digitális kalandokat személyes AI társaiddal, miközben megőrzöd az adatszuverenitásodat.</p>'
        decentralized:
            title: 'Decentralizált,<br/>Szabad'
            description: '<p>Saját üzemeltetésű és független.</p><p>Nincsenek harmadik felek, akik monitorozzák és monetizálják a magánéletedet.</p><p>Nincsenek harmadik féltől származó sütik.</p><p>Nincsenek hirdetések.</p><p>Csak te és a barátaid - összekapcsolva.</p>'
        open_source:
            title: 'Nyílt forráskódú'
            description: '<p>A CitadelQuest egy nyílt forráskódú projekt, a <a href="https://github.com/CitadelQuest/CitadelQuest" target="_blank" class="text-cyber" title="CitadelQuest GitHub">GitHubon</a> hosztolva, amelynek fő célja, hogy közjót szolgáljon, nem pedig a felhasználók magánéletéből profitáljon.</p><p>Elkötelezettek vagyunk amellett, hogy ingyenes szoftvert biztosítsunk azoknak, akik osztják a jobb, összekapcsolt világ vízióját.</p>'
        easy_to_start:
            title: 'Könnyen indítható'
            description: '<p>A CitadelQuest úgy lett tervezve, hogy könnyen elindítható legyen, még a nem technikai felhasználók számára is.</p><p><strong>Már van saját domained és weboldalad?</strong></p><p>Tökéletes! <span class="text-cyber">Telepítheted a saját CitadelQuestedet egy aldomainre és azonnal használhatod.</span></p><p>...vagy maradhatsz itt, a nyilvános <a href="https://base.citadelquest.com/" target="_blank" class="text-cyber" title="CitadelQuest Base">CitadelQuest Base</a>-en, és kipróbálhatod - erőfeszítés nélkül és ingyen.</p>'

