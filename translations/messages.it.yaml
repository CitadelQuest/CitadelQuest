home:
    actions:
        create_citadel: 'Crea il tuo account CitadelQuest'
        login: 'Accedi'
    features:
        data_control:
            title: 'I tuoi dati,<br/>Il tuo pieno controllo'
            description: '<p>Crittografia end-to-end e database personale garantiscono che i tuoi dati restino tuoi.</p><p>Tu decidi chi ha accesso ai tuoi dati condivisi.</p><p><a href="/backups">Backup</a>. Manuali e automatici.</p><p>Supporto per la migrazione dell''account da una Cittadella all''altra.</p>'
        ai_collab:
            title: 'Collaborazione IA'
            description: '<p>Affronta le attività quotidiane, i progetti a lungo termine o vivi avventure digitali con i tuoi fidati compagni IA personali, mantenendo la sovranità dei dati.</p>'
        decentralized:
            title: 'Decentralizzato,<br/>Gratuito'
            description: '<p>Self-hosted e indipendente.</p><p>Nessuna terza parte che monitora e monetizza la tua privacy.</p><p>Nessun cookie di terze parti.</p><p>Nessuna pubblicità.</p><p>Solo tu e i tuoi amici - connessi.</p>'
        open_source:
            title: 'Open Source'
            description: '<p>CitadelQuest è un progetto open source, ospitato su <a href="https://github.com/CitadelQuest/CitadelQuest" target="_blank" class="text-cyber" title="CitadelQuest GitHub">GitHub</a>, con lo scopo principale di fornire un bene pubblico, invece di trarre profitto dalla privacy degli utenti.</p><p>Ci impegniamo a fornire software gratuito agli utenti che condividono la nostra visione di un mondo migliore e connesso.</p>'
        easy_to_start:
            title: 'Facile da iniziare'
            description: '<p>CitadelQuest è progettato per essere facile da usare, anche per persone non tecniche.</p><p><strong>Hai già un tuo dominio e sito web?</strong></p><p>Perfetto! <span class="text-cyber">Puoi installare il tuo CitadelQuest su un sottodominio e iniziare a usarlo subito.</span></p><p>..oppure puoi restare qui, sulla nostra <a href="https://base.citadelquest.com/" target="_blank" class="text-cyber" title="CitadelQuest Base">CitadelQuest Base</a> pubblica, e provarlo - senza sforzo e gratuitamente.</p>'

