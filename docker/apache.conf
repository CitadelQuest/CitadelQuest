# Long timeout — AI requests (model inference + tool chains), including nested
# Spirit-to-Spirit consultations, can take a long time. Default 60s causes 504
# Gateway Timeout while PHP keeps running and finishes successfully (response
# only visible after refresh). 36000s = 10 hours headroom.
Timeout 36000

<VirtualHost *:80>
    ServerName citadelquest.local
    ServerAlias localhost
    DocumentRoot /var/www/html/public
    
    # Trust proxy headers from Coolify/Traefik
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on
    SetEnvIf X-Forwarded-Port "443" SERVER_PORT=443
    
    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        
        # Disable directory browsing
        Options -Indexes +FollowSymLinks
        
        # Symfony routing
        FallbackResource /index.php
        
        # Security headers (X-Frame-Options handled by Symfony SecurityHeadersSubscriber)
        Header always set X-Content-Type-Options nosniff
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </Directory>
    
    # Deny access to sensitive files
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
    
    # Error and access logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
